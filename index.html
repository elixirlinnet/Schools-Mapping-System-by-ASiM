<!DOCTYPE html>
<html>
<head>
  <title>Schools Mapping System by ASiM</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f1f2f6;
      margin: 0;
    }

    /* Header */
    .header {
      background: #1e272e;
      color: white;
      padding: 12px;
      text-align: center;
    }

    .header h2 {
      margin: 0;
      font-size: 18px;
    }

    .header p {
      margin: 2px 0 0;
      font-size: 12px;
      color: #d2dae2;
    }

    /* Controls */
    .controls {
      background: #ffffff;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-bottom: 1px solid #ddd;
    }

    .row {
      display: flex;
      gap: 6px;
    }

    input, select, button {
      padding: 10px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
      width: 100%;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #1e90ff;
    }

    button {
      background: #1e272e;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #485460;
    }

    .btn-secondary {
      background: #57606f;
    }

    /* Map */
    #map {
      height: calc(100vh - 200px);
    }

    /* Desktop view */
    @media (min-width: 768px) {
      .controls {
        flex-direction: row;
        flex-wrap: wrap;
      }

      .row {
        width: auto;
      }

      input {
        width: 200px;
      }

      select {
        width: 150px;
      }

      button {
        width: auto;
      }
    }
  </style>
</head>

<body>

<div class="header">
  <h2>Schools Mapping System by ASiM</h2>
  <p>DEA Khushab – Field Monitoring</p>
</div>

<div class="controls">

  <div class="row">
    <input type="text" id="searchBox" placeholder="Search school...">
    <button onclick="searchSchool()">Search</button>
    <button class="btn-secondary" onclick="clearSearch()">Clear</button>
  </div>

  <div class="row">
    <select id="levelFilter"><option value="all">All Levels</option></select>
    <select id="genderFilter"><option value="all">All Gender</option></select>
    <select id="categoryFilter"><option value="all">All Categories</option></select>
    <select id="markazFilter"><option value="all">All Markaz</option></select>
  </div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// Map (no fixed center)
var map = L.map('map');

// Tile
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Icons
var blueIcon = new L.Icon({
  iconUrl: 'https://maps.google.com/mapfiles/ms/icons/blue-dot.png',
  iconSize: [32, 32]
});

var redIcon = new L.Icon({
  iconUrl: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png',
  iconSize: [32, 32]
});

// Data
var schools = [];

// Load CSV
fetch('schools.csv')
  .then(response => response.text())
  .then(data => {

    var rows = data.split("\n");

    rows.slice(1).forEach(function(row){

      var cols = row.split(",");

      if(cols.length >= 7){

        var lat = parseFloat(cols[1].trim());
        var lng = parseFloat(cols[2].trim());

        if(!isNaN(lat) && !isNaN(lng)){

          schools.push({
            name: cols[0].trim(),
            lat: lat,
            lng: lng,
            level: cols[3].trim(),
            gender: cols[4].trim(),
            category: cols[5].trim(),
            markaz: cols[6].trim()
          });

        }
      }
    });

    populateFilters();
    showSchools();
  });

// Populate filters
function populateFilters(){

  var sets = {
    levelFilter:new Set(),
    genderFilter:new Set(),
    categoryFilter:new Set(),
    markazFilter:new Set()
  };

  schools.forEach(s=>{
    sets.levelFilter.add(s.level);
    sets.genderFilter.add(s.gender);
    sets.categoryFilter.add(s.category);
    sets.markazFilter.add(s.markaz);
  });

  Object.keys(sets).forEach(id=>{
    var d=document.getElementById(id);
    sets[id].forEach(v=>{
      var o=document.createElement("option");
      o.value=v;
      o.text=v;
      d.appendChild(o);
    });
  });
}

// Show schools with AUTO CENTER
function showSchools(){

  var l=levelFilter.value,
      g=genderFilter.value,
      c=categoryFilter.value,
      m=markazFilter.value;

  map.eachLayer(function(layer){
    if(layer instanceof L.Marker){
      map.removeLayer(layer);
    }
  });

  var bounds = [];

  schools.forEach(function(s){

    if(
      (l==="all"||s.level===l)&&
      (g==="all"||s.gender===g)&&
      (c==="all"||s.category===c)&&
      (m==="all"||s.markaz===m)
    ){

      var icon = s.gender==="Female"?redIcon:blueIcon;

      L.marker([s.lat,s.lng],{icon:icon})
        .addTo(map)
        .bindPopup(
          s.name+"<br>"+s.level+"<br>"+s.gender+"<br>"+s.category+"<br>Markaz: "+s.markaz
        );

      bounds.push([s.lat, s.lng]);
    }
  });

  // Smart centering
  if(bounds.length > 1){
    map.fitBounds(bounds);
  } else if(bounds.length === 1){
    map.setView(bounds[0], 14); // fixed zoom for single point
  }
}

// Search (kept same but improved centering)
function searchSchool(){

  var q=searchBox.value.trim().toLowerCase();

  if(q===""){ showSchools(); return; }

  var results=schools.filter(s=>s.name.toLowerCase().includes(q));

  if(results.length){

    map.eachLayer(function(layer){
      if(layer instanceof L.Marker){
        map.removeLayer(layer);
      }
    });

    var bounds=[];

    results.forEach(s=>{
      var icon=s.gender==="Female"?redIcon:blueIcon;

      L.marker([s.lat,s.lng],{icon:icon})
        .addTo(map)
        .bindPopup(s.name);

      bounds.push([s.lat,s.lng]);
    });

    if(bounds.length > 1){
      map.fitBounds(bounds);
    } else {
      map.setView(bounds[0], 14);
    }

  } else alert("No matching school found");
}

// Clear
function clearSearch(){
  searchBox.value="";
  showSchools();
}

// Coordinates
map.on('click', function(e){

  var lat=e.latlng.lat.toFixed(6);
  var lng=e.latlng.lng.toFixed(6);

  L.popup()
    .setLatLng(e.latlng)
    .setContent(
      "Latitude: "+lat+"<br>Longitude: "+lng+
      "<br><br><button onclick='copyCoords(\""+lat+","+lng+"\")'>Copy</button>"
    )
    .openOn(map);

});

function copyCoords(t){
  navigator.clipboard.writeText(t);
  alert("Copied: "+t);
}

// Events
levelFilter.onchange=showSchools;
genderFilter.onchange=showSchools;
categoryFilter.onchange=showSchools;
markazFilter.onchange=showSchools;

</script>

</body>
</html>
