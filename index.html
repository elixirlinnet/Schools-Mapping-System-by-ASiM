<!DOCTYPE html>
<html>
<head>
  <title>Schools Mapping System by ASiM</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f1f2f6;
      margin: 0;
    }

    .header {
      background: #1e272e;
      color: white;
      padding: 12px;
      text-align: center;
    }

    .controls {
      background: #ffffff;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-bottom: 1px solid #ddd;
    }

    .row { display: flex; gap: 6px; }

    input, button {
      padding: 10px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
      width: 100%;
    }

    button {
      background: #1e272e;
      color: white;
      border: none;
      cursor: pointer;
    }

    .btn-secondary { background: #57606f; }

    /* Dropdown filters */
    .dropdown {
  position: relative;
  width: 100%;
}
@media (max-width: 600px) {
  .dropdown-content {
    width: 100%;
    left: 0;
  }
}
    .dropdown-content {
  display: none;
  position: absolute;
  background: white;
  border: 1px solid #ccc;
  max-height: 250px;
  overflow-y: auto;
  z-index: 1000;
  width: 100%;
  min-width: 150px;
  box-sizing: border-box;
  padding: 6px;
}

    .dropdown-content label {
      display: block;
      font-size: 13px;
    }
    .dropdown-content button {
  width: 100%;
  margin-bottom: 4px;
  padding: 5px;
  font-size: 12px;
}

    /* Map */
    #map {
      height: calc(100vh - 260px);
    }

    /* Stats */
    .stats {
      background: #fff;
      padding: 10px;
      font-size: 13px;
      border-top: 1px solid #ddd;
    }
  </style>
</head>

<body>

<div class="header">
  <h2>Schools Mapping System by ASiM</h2>
  <p>DEA Khushab – Field Monitoring</p>
</div>

<div class="controls">

  <div class="row">
    <input type="text" id="searchBox" placeholder="Search school...">
    <button onclick="searchSchool()">Search</button>
    <button class="btn-secondary" onclick="clearSearch()">Clear</button>
  </div>

  <div class="row">

    <div class="dropdown">
      <button onclick="toggleDropdown('levelFilterBox')">Level ▼</button>
      <div id="levelFilterBox" class="dropdown-content"></div>
    </div>

    <div class="dropdown">
      <button onclick="toggleDropdown('genderFilterBox')">Gender ▼</button>
      <div id="genderFilterBox" class="dropdown-content"></div>
    </div>

    <div class="dropdown">
      <button onclick="toggleDropdown('categoryFilterBox')">Category ▼</button>
      <div id="categoryFilterBox" class="dropdown-content"></div>
    </div>

    <div class="dropdown">
      <button onclick="toggleDropdown('markazFilterBox')">Markaz ▼</button>
      <div id="markazFilterBox" class="dropdown-content"></div>
    </div>

  </div>

</div>

<div id="map"></div>
<div class="stats" id="statsBox"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var blueIcon = new L.Icon({
  iconUrl: 'https://maps.google.com/mapfiles/ms/icons/blue-dot.png',
  iconSize: [32, 32]
});

var redIcon = new L.Icon({
  iconUrl: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png',
  iconSize: [32, 32]
});

var schools = [];

fetch('schools.csv')
.then(r => r.text())
.then(data => {

  var rows = data.split("\n");

  rows.slice(1).forEach(row => {
    var c = row.split(",");

    if(c.length >= 7){
      var lat = parseFloat(c[1].trim());
      var lng = parseFloat(c[2].trim());

      if(!isNaN(lat) && !isNaN(lng)){
        schools.push({
          name:c[0].trim(),
          lat:lat,
          lng:lng,
          level:c[3].trim(),
          gender:c[4].trim(),
          category:c[5].trim(),
          markaz:c[6].trim()
        });
      }
    }
  });

  populateFilters();
  showSchools();
});

function populateFilters(){

  var sets = {
    levelFilterBox:new Set(),
    genderFilterBox:new Set(),
    categoryFilterBox:new Set(),
    markazFilterBox:new Set()
  };

  schools.forEach(s=>{
    sets.levelFilterBox.add(s.level);
    sets.genderFilterBox.add(s.gender);
    sets.categoryFilterBox.add(s.category);
    sets.markazFilterBox.add(s.markaz);
  });

  Object.keys(sets).forEach(id=>{
    var container = document.getElementById(id);

    var container = document.getElementById(id);

// Add buttons
var btnAll = document.createElement("button");
btnAll.textContent = "Select All";
btnAll.onclick = function(){
  container.querySelectorAll("input").forEach(cb => cb.checked = true);
  showSchools();
};

var btnNone = document.createElement("button");
btnNone.textContent = "Clear All";
btnNone.onclick = function(){
  container.querySelectorAll("input").forEach(cb => cb.checked = false);
  showSchools();
};

container.appendChild(btnAll);
container.appendChild(btnNone);

// Add checkboxes
sets[id].forEach(val=>{
  var label = document.createElement("label");

  var cb = document.createElement("input");
  cb.type = "checkbox";
  cb.value = val;
  cb.checked = true;
  cb.onchange = showSchools;

  label.appendChild(cb);
  label.append(" " + val);

  container.appendChild(label);
});
  });
}

function getSelected(id){
  var arr=[];
  document.querySelectorAll(`#${id} input:checked`)
    .forEach(cb=>arr.push(cb.value));
  return arr;
}

function showSchools(){

  var Ls = getSelected("levelFilterBox");
  var Gs = getSelected("genderFilterBox");
  var Cs = getSelected("categoryFilterBox");
  var Ms = getSelected("markazFilterBox");

  map.eachLayer(l=>{
    if(l instanceof L.Marker) map.removeLayer(l);
  });

  var bounds=[];
  var stats={
    total:0,male:0,female:0,
    primary:0,middle:0,secondary:0,
    sed:0,psrp1:0,psrp2:0,
    markaz:{}
  };

  schools.forEach(s=>{

    if(
      Ls.includes(s.level) &&
      Gs.includes(s.gender) &&
      Cs.includes(s.category) &&
      Ms.includes(s.markaz)
    ){

      stats.total++;

      if(s.gender==="Male") stats.male++;
      if(s.gender==="Female") stats.female++;

      if(s.level==="Primary") stats.primary++;
      if(s.level==="Middle") stats.middle++;
      if(s.level==="Secondary") stats.secondary++;

      if(s.category==="SED") stats.sed++;
      if(s.category==="PSRP-I") stats.psrp1++;
      if(s.category==="PSRP-II") stats.psrp2++;

      stats.markaz[s.markaz]=(stats.markaz[s.markaz]||0)+1;

      var icon = s.gender==="Female"?redIcon:blueIcon;

      L.marker([s.lat,s.lng],{icon})
        .addTo(map)
        .bindPopup(s.name);

      bounds.push([s.lat,s.lng]);
    }
  });

  if(bounds.length>1) map.fitBounds(bounds);
  else if(bounds.length===1) map.setView(bounds[0],14);

  updateStats(stats);
}

function updateStats(s){

  var genderTotal = s.male + s.female;
  var levelTotal = s.primary + s.middle + s.secondary;
  var categoryTotal = s.sed + s.psrp1 + s.psrp2;

  var html = `
  <b>Total Schools:</b> ${s.total}<br><br>

  <b>Gender Total (${genderTotal}):</b><br>
  Male: ${s.male}<br>
  Female: ${s.female}<br><br>

  <b>Level Total (${levelTotal}):</b><br>
  Primary: ${s.primary}<br>
  Middle: ${s.middle}<br>
  Secondary: ${s.secondary}<br><br>

  <b>Category Total (${categoryTotal}):</b><br>
  SED: ${s.sed}<br>
  PSRP-I: ${s.psrp1}<br>
  PSRP-II: ${s.psrp2}<br><br>

  <b>Markaz-wise Total (${s.total}):</b><br>
  `;

  for(var m in s.markaz){
    html += `${m}: ${s.markaz[m]}<br>`;
  }

  document.getElementById("statsBox").innerHTML = html;
}

function searchSchool(){
  var q = searchBox.value.trim().toLowerCase();
  if(q===""){showSchools();return;}

  var res = schools.filter(s=>s.name.toLowerCase().includes(q));

  map.eachLayer(l=>{
    if(l instanceof L.Marker) map.removeLayer(l);
  });

  var b=[];
  res.forEach(s=>{
    L.marker([s.lat,s.lng]).addTo(map).bindPopup(s.name);
    b.push([s.lat,s.lng]);
  });

  if(b.length>1) map.fitBounds(b);
  else if(b.length===1) map.setView(b[0],14);
}

function clearSearch(){
  searchBox.value="";
  showSchools();
}

function toggleDropdown(id){

  var el = document.getElementById(id);

  var isOpen = el.style.display === "block";

  // Close all dropdowns
  document.querySelectorAll(".dropdown-content")
    .forEach(d => d.style.display = "none");

  // If it was NOT open, open it
  if(!isOpen){
    el.style.display = "block";
  }

}

map.on('click',e=>{
  var lat=e.latlng.lat.toFixed(6);
  var lng=e.latlng.lng.toFixed(6);

  L.popup()
    .setLatLng(e.latlng)
    .setContent(
      `Lat: ${lat}<br>Lng: ${lng}<br>
      <button onclick="copyCoords('${lat},${lng}')">Copy</button>`
    )
    .openOn(map);
});

function copyCoords(t){
  navigator.clipboard.writeText(t);
  
}
document.addEventListener("click", function(e){

  const isButton = e.target.closest(".dropdown button");
  const isContent = e.target.closest(".dropdown-content");

  if(!isButton && !isContent){
    document.querySelectorAll(".dropdown-content")
      .forEach(d => d.style.display = "none");
  }

});
</script>

</body>
</html>
